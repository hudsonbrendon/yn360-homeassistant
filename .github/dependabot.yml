version: 2
updates:
  # Keep GitHub Actions (checkout, setup-python, hassfest, hacs, ...) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # Python test dependencies declared in pyproject.toml.
  # Note: the runtime dependency (yn360-ble) lives in custom_components/yongnuo_yn360/
  # manifest.json, which Dependabot does not parse — bump it there by hand.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
